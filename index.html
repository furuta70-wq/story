<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>物語 27場面 圧縮アプリ</title>
<style>
:root{
  --bg:#f7f4ee;
  --bg2:#f2ece2;
  --paper:#fffdfa;
  --paper-2:rgba(255,253,250,.9);
  --ink:#2c2925;
  --muted:#766e65;
  --line:#ddd4c8;
  --line-strong:#cfc4b5;
  --danger:#8d5f5c;
  --danger-bg:#fbf6f5;
  --shadow:0 10px 28px rgba(48,36,24,.06);
  --shadow-soft:0 4px 14px rgba(48,36,24,.05);
  --radius:18px;
  --hud-radius:999px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(circle at top left, rgba(201,214,212,.2), transparent 24%),
    radial-gradient(circle at top right, rgba(234,223,205,.34), transparent 28%),
    linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
  color:var(--ink);
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
}
.wrapper{
  max-width:900px;
  margin:0 auto;
  padding:22px 16px 96px;
}
.topline{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:18px;
}
.topline-left{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.title{
  font-size:1.06rem;
  font-weight:700;
  letter-spacing:.04em;
}
.story-select{
  appearance:none;
  border:1px solid var(--line);
  background:rgba(255,253,250,.82);
  color:var(--ink);
  font:inherit;
  padding:10px 40px 10px 14px;
  border-radius:999px;
  box-shadow:var(--shadow-soft);
  cursor:pointer;
  background-image:
    linear-gradient(45deg, transparent 50%, #7b7268 50%),
    linear-gradient(135deg, #7b7268 50%, transparent 50%);
  background-position:
    calc(100% - 18px) calc(50% - 2px),
    calc(100% - 12px) calc(50% - 2px);
  background-size:6px 6px, 6px 6px;
  background-repeat:no-repeat;
}
.reset-btn{
  appearance:none;
  border:1px solid var(--line);
  background:rgba(255,253,250,.82);
  color:var(--ink);
  font:inherit;
  padding:10px 16px;
  border-radius:999px;
  cursor:pointer;
  box-shadow:var(--shadow-soft);
  transition:transform .16s ease, box-shadow .16s ease, background .16s ease;
}
.reset-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(48,36,24,.08);
}
.reset-btn:active{
  transform:translateY(1px) scale(.99);
}
.list{
  display:flex;
  flex-direction:column;
  gap:14px;
}
.card{
  background:var(--paper-2);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px 18px 16px;
  transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease, opacity .22s ease;
  transform-origin:center center;
  will-change:transform, opacity;
}
.card:hover{
  transform:translateY(-1px);
  box-shadow:0 14px 32px rgba(48,36,24,.08);
  border-color:var(--line-strong);
}
.card.removing{
  pointer-events:none;
  animation:discardCard .42s cubic-bezier(.2,.8,.2,1) forwards;
}
@keyframes discardCard{
  0%{
    opacity:1;
    transform:scale(1) translateX(0);
    box-shadow:var(--shadow);
  }
  18%{
    opacity:1;
    transform:scale(.985) translateX(0);
    box-shadow:0 6px 12px rgba(48,36,24,.04);
  }
  100%{
    opacity:0;
    transform:scale(.96) translateX(54px);
    box-shadow:none;
  }
}
.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:12px;
}
.card-number{
  display:inline-flex;
  align-items:center;
  min-height:32px;
  padding:0 12px;
  border-radius:999px;
  background:#f3eee6;
  color:#6f675d;
  font-size:.93rem;
  font-weight:700;
  letter-spacing:.02em;
}
.discard{
  appearance:none;
  border:1px solid rgba(141,95,92,.26);
  background:var(--danger-bg);
  color:var(--danger);
  font:inherit;
  padding:8px 13px;
  border-radius:999px;
  cursor:pointer;
  transition:transform .12s ease, background .16s ease, box-shadow .16s ease;
}
.discard:hover{
  box-shadow:0 6px 16px rgba(141,95,92,.08);
}
.discard:active{
  transform:scale(.96);
}
.card-body p{
  margin:0;
  line-height:1.98;
  font-size:1.28rem;
  letter-spacing:.01em;
}
.remaining-chips{
  margin-top:18px;
  padding:15px 16px;
  border:1px solid var(--line);
  border-radius:16px;
  background:rgba(255,253,250,.68);
  color:var(--muted);
  font-size:1.08rem;
  line-height:2;
  letter-spacing:.02em;
}
.empty{
  text-align:center;
  color:var(--muted);
  border:1px dashed var(--line);
  border-radius:var(--radius);
  padding:38px 18px;
  background:rgba(255,255,255,.5);
}
.hud{
  position:fixed;
  top:calc(env(safe-area-inset-top, 0px) + 14px);
  right:14px;
  z-index:1000;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 14px;
  border:1px solid rgba(208,198,184,.78);
  border-radius:var(--hud-radius);
  background:rgba(255,253,249,.82);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  box-shadow:0 10px 26px rgba(48,36,24,.1);
}
.hud-label{
  color:var(--muted);
  font-size:.9rem;
}
.hud-count{
  font-size:1.05rem;
  font-weight:800;
  letter-spacing:.03em;
  min-width:72px;
  text-align:right;
  display:inline-block;
  transform-origin:center center;
}
.hud.pulse .hud-count{
  animation:hudPulse .34s ease;
}
@keyframes hudPulse{
  0%{transform:scale(1)}
  35%{transform:scale(1.12)}
  100%{transform:scale(1)}
}
.hud-mini{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#b7aba0;
  opacity:.9;
}

.section-title{
  margin:22px 2px 10px;
  color:var(--muted);
  font-size:.95rem;
  font-weight:700;
  letter-spacing:.04em;
}
.discarded-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:8px;
}
.card.discarded-card{
  opacity:.72;
  transform:scale(.965);
  transform-origin:top center;
  background:rgba(241,238,233,.95);
  border-color:#d8d1c8;
  box-shadow:0 6px 16px rgba(48,36,24,.04);
}
.card.discarded-card:hover{
  transform:scale(.965);
  box-shadow:0 6px 16px rgba(48,36,24,.04);
  border-color:#d8d1c8;
}
.restore{
  appearance:none;
  border:1px solid rgba(118,109,101,.22);
  background:rgba(255,253,250,.82);
  color:var(--ink);
  font:inherit;
  padding:8px 13px;
  border-radius:999px;
  cursor:pointer;
  transition:transform .12s ease, box-shadow .16s ease;
}
.restore:hover{
  box-shadow:0 6px 16px rgba(48,36,24,.06);
}
.restore:active{
  transform:scale(.96);
}
.discarded-empty{
  color:var(--muted);
  font-size:.96rem;
  padding:8px 2px 2px;
}

@media (max-width:700px){
  .wrapper{padding:16px 12px 88px}
  .topline{
    align-items:flex-start;
    flex-direction:column;
    gap:10px;
  }
  .topline-left{
    width:100%;
  }
  .story-select{
    max-width:100%;
  }
  .card{padding:16px 16px 14px}
  .card-top{flex-direction:column;align-items:flex-start}
  .card-body p{font-size:1.18rem;line-height:1.92}
  .remaining-chips{font-size:1rem}
  .hud{
    top:calc(env(safe-area-inset-top, 0px) + 10px);
    right:10px;
    padding:9px 12px;
  }
}
</style>
</head>
<body>
<div class="hud" id="hud">
  <div class="hud-mini"></div>
  <div class="hud-label">残り</div>
  <div class="hud-count" id="hudCount">27 / 27</div>
</div>

<div class="wrapper">
  <div class="topline">
    <div class="topline-left">
      <div class="title" id="pageTitle">浦島太郎 27場面</div>
      <select id="storySelect" class="story-select" aria-label="物語を選ぶ">
        <option value="urashimataro">浦島太郎</option>
        <option value="momotaro">桃太郎</option>
        <option value="kaguyahime">かぐや姫</option>
        <option value="cinderella">シンデレラ</option>
      </select>
    </div>
    <button class="reset-btn" id="resetBtn">全て戻す</button>
  </div>

  <div class="section-title">残っている場面</div>
  <div id="sceneList" class="list"></div>
  <div id="remainingChips" class="remaining-chips"></div>

  <div class="section-title">捨てた場面</div>
  <div id="discardedList" class="discarded-list"></div>
</div>

<script>
const STORY_DATA = {
  urashimataro: {
    title: "浦島太郎",
    scenes: [
      ["海辺の小さな村に、浦島太郎という若者が父と母といっしょに暮らしていました。","波の音がいつも聞こえる家で、家族三人の静かな毎日が流れていました。"],
      ["浦島太郎は村の友だちとも仲よく、よく浜辺でいっしょに遊んだり話したりしていました。","だれにでも親しまれる、明るくやさしい若者として知られていました。"],
      ["浦島太郎は毎日海に出て魚をとり、父と母を助けながらまじめに働いていました。","そのやさしさと働きぶりを、村の人たちもあたたかく見守っていました。"],
      ["ある日のこと、浦島太郎は浜辺で子どもたちが一匹の亀をいじめているのを見つけました。","楽しそうな声のまじる中に、亀の苦しそうな様子が見えて、浦島太郎は足を止めました。"],
      ["浦島太郎は子どもたちをしかって亀を助け、そっと海へ返してやりました。","亀は波の向こうへ泳いでいき、浦島太郎はほっとしながらその姿を見送りました。"],
      ["家へ帰った浦島太郎は、その日の出来事を父と母に静かに話して聞かせました。","父も母も、浦島太郎のやさしい心をうれしく思い、何度もうなずいていました。"],
      ["それから数日たったころ、浦島太郎が海へ出ると、あの亀がまた姿を現しました。","亀は命を助けてもらったお礼に、竜宮城へ案内したいと話しました。"],
      ["浦島太郎は亀の背に乗り、ゆっくりと海の中へ入っていきました。","きらきら光る水面が遠ざかり、ふしぎな旅がいよいよ始まりました。"],
      ["浅い海の中には、小さな魚たちやゆらゆら揺れる海藻が広がっていました。","浦島太郎は見たこともない美しい景色に、思わず目をみはりました。"],
      ["さらに深くもぐると、色あざやかな魚や珊瑚があたりいっぱいに広がっていました。","やわらかな光に包まれた海の世界は、ますます華やかにかがやいて見えました。"],
      ["もっと深い海の底近くまで来ると、光に包まれた大きな竜宮城が見えてきました。","あまりにも美しいその姿に、浦島太郎は思わず息をのみました。"],
      ["やがて浦島太郎は、ついに竜宮城の前までたどり着きました。","りっぱな門の前に立つと、まるで夢の中にいるような気持ちになりました。"],
      ["するとそこへ乙姫が現れ、浦島太郎をやさしい笑顔で迎えてくれました。","乙姫は、亀の命を助けてくれたことへの感謝を、心をこめて伝えました。"],
      ["竜宮城では、ごちそうや美しい舞が次々に用意され、浦島太郎は手厚くもてなされました。","見たこともない楽しさに包まれて、浦島太郎の心はうきうきとおどりました。"],
      ["楽しい日々はいつまでも続き、浦島太郎は時のたつのも忘れて暮らしました。","毎日が明るく夢のようで、この幸せが終わることはないように思えました。"],
      ["けれどもある日、浦島太郎はふと、村に残してきた父と母のことを思い出しました。","にぎやかな竜宮城の中で、急に胸の奥へさびしさがしみこんできました。"],
      ["浦島太郎は乙姫のもとへ行き、故郷の村へ帰りたいとお願いしました。","乙姫は悲しそうにほほえみながらも、浦島太郎の気持ちを受けとめました。"],
      ["別れのとき、乙姫は名残を惜しみながら、浦島太郎にひとつの玉手箱を手渡しました。","それは、きらりと美しく光る、とても大切そうな箱でした。"],
      ["乙姫は浦島太郎に、この箱は決して開けてはならないと、くり返し言いました。","浦島太郎はしっかりとうなずき、玉手箱を大事に抱えて帰ることにしました。"],
      ["浦島太郎は再び亀の背に乗り、海の上へと送ってもらいました。","なつかしい浜辺が見えてくると、浦島太郎は急いで村へ向かいました。"],
      ["ところが村へ着いてみると、あたりの様子はすっかり変わっていました。","見覚えのあるはずの浜辺なのに、どこか知らない場所のように思えました。"],
      ["浦島太郎は知っている家や人をさがして歩きましたが、だれひとり見つかりませんでした。","何度見回しても、昔の村の面影はほとんど残っていませんでした。"],
      ["やがて浦島太郎は、父と母のものらしい古い墓を見つけました。","墓は草に埋もれるように立ち、長い年月の流れを静かに語っていました。"],
      ["そのとき浦島太郎は、自分の知らないあいだに長い長い年月が過ぎたのだと知りました。","あまりのことに声も出ず、その場に立ちつくすことしかできませんでした。"],
      ["深い悲しみにたえきれなくなった浦島太郎は、とうとう玉手箱を開けてしまいました。","そのとたん、箱の中から白い煙がふわりとあふれ出しました。"],
      ["白い煙はたちまち浦島太郎の体を包み、若かった浦島太郎は見る間におじいさんになりました。","顔も体もあっという間に老いてしまい、もとの姿には戻れませんでした。"],
      ["海辺には、ふたの開いた玉手箱だけが、ぽつんと残されていました。","波の音だけが静かにひびき、浦島太郎の姿はもうそこにはありませんでした。"]
    ]
  },

    title: "桃太郎",

      ["ある朝、おじいさんは山へしばかりに行き、おばあさんは川へ洗たくに出かけました。","その日も、いつもと変わらないおだやかな朝が始まっていました。"],
      ["おばあさんが川で洗たくをしていると、上流から大きな桃がどんぶらこ、どんぶらこと流れてきました。","あまりに大きくて立派な桃だったので、おばあさんはびっくりしました。"],
      ["おばあさんはその桃を拾い上げ、大事そうに抱えて家へ持ち帰ることにしました。","早くおじいさんに見せたくて、足どりもどこかうれしそうでした。"],
      ["家に帰ると、おじいさんもちょうど山から戻ってきたところでした。","二人は大きな桃を前にして、ふしぎそうに顔を見合わせました。"],
      ["晩ごはんのしたくをしようと、おじいさんとおばあさんは桃を切ってみることにしました。","すると桃の中から、元気な男の子がぱっと現れたのです。"],
      ["あまりのことに、おじいさんもおばあさんも目を丸くして驚きました。","けれども、かわいらしいその子を見るうちに、二人の顔はたちまち笑顔になりました。"],
      ["二人はその子を天からの授かりものだと思い、心をこめて育てることにしました。","桃から生まれたので、その子は桃太郎と名づけられました。"],

      ["そのころ村では、鬼ヶ島の鬼たちがたびたびやって来ては、宝物や食べ物を奪っていました。","村の人たちは鬼をこわがり、不安な気持ちで毎日を暮らしていました。"],

      ["ある日、桃太郎はおじいさんとおばあさんに、鬼ヶ島へ行きたいと話しました。","二人はとても心配しましたが、桃太郎の決心がかたいことを知りました。"],
      ["おばあさんは旅のために、力の出るきびだんごをていねいに作ってくれました。","おじいさんも身じたくを手伝いながら、道中の無事を何度も祈りました。"],

      ["さらに進んでいくと、こんどは猿が現れて、きびだんごをほしいと言いました。","桃太郎は猿にも一つやり、猿もまた心強い家来になりました。"],
      ["そのあと空からキジが飛んできて、桃太郎たちの前に舞い降りました。","キジもきびだんごをもらい、鬼退治の仲間に加わることになりました。"],

      ["城の門まで来ると、桃太郎たちはいよいよ鬼退治を始めました。","犬も猿もキジも、それぞれの力を生かして勇ましく戦いました。"],

    ]
  },
  kaguyahime: {
    title: "かぐや姫",
    scenes: [
      ["むかしむかし、子どものいないおじいさんとおばあさんが、山里で静かに暮らしていました。","二人はたがいに助け合いながら、つつましく毎日を過ごしていました。"],

const stateByStory = {};
for (const key of Object.keys(STORY_DATA)) {
  stateByStory[key] = { discarded: new Set() };
}

let currentStoryKey = "urashimataro";

const storySelect = document.getElementById('storySelect');
const pageTitle = document.getElementById('pageTitle');
const sceneList = document.getElementById('sceneList');
const remainingCountHud = document.getElementById('hudCount');
const remainingChips = document.getElementById('remainingChips');
const discardedList = document.getElementById('discardedList');
const resetBtn = document.getElementById('resetBtn');
const hud = document.getElementById('hud');

function escapeHtml(text){
  return text
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}

function toCircledNumber(n){
  const map = {
    1:'①',2:'②',3:'③',4:'④',5:'⑤',6:'⑥',7:'⑦',8:'⑧',9:'⑨',
    10:'⑩',11:'⑪',12:'⑫',13:'⑬',14:'⑭',15:'⑮',16:'⑯',17:'⑰',18:'⑱',
    19:'⑲',20:'⑳',21:'㉑',22:'㉒',23:'㉓',24:'㉔',25:'㉕',26:'㉖',27:'㉗'
  };
  return map[n] || String(n);
}

function currentStory(){
  return STORY_DATA[currentStoryKey];
}

function currentDiscarded(){
  return stateByStory[currentStoryKey].discarded;
}

function keptScenes(){
  return currentStory().scenes
    .map((text, i) => ({ number: i + 1, text }))
    .filter(scene => !currentDiscarded().has(scene.number));
}

function pulseHud(){
  hud.classList.remove('pulse');
  void hud.offsetWidth;
  hud.classList.add('pulse');
}

function updateHudAndFooter(){
  const kept = keptScenes();
  const total = currentStory().scenes.length;
  remainingCountHud.textContent = `${kept.length} / ${total}`;
  remainingChips.textContent = kept.length
    ? kept.map(scene => toCircledNumber(scene.number)).join(' ')
    : 'なし';
  pageTitle.textContent = `${currentStory().title} 27場面`;
}

function render(){
  const story = currentStory();
  const discardedSet = currentDiscarded();
  const allScenes = story.scenes.map((text, i) => ({ number: i + 1, text }));
  const kept = allScenes.filter(scene => !discardedSet.has(scene.number));
  const discardedScenes = allScenes.filter(scene => discardedSet.has(scene.number));

  updateHudAndFooter();

  if(kept.length === 0){
    sceneList.innerHTML = '<div class="empty">場面がありません。上の「全て戻す」で元に戻せます。</div>';
  } else {
    sceneList.innerHTML = kept.map(scene => `
      <article class="card" data-number="${scene.number}">
        <div class="card-top">
          <div class="card-number">場面${scene.number}</div>
          <button class="discard" data-number="${scene.number}">捨てる</button>
        </div>
        <div class="card-body">
          <p>${escapeHtml(scene.text[0])}${escapeHtml(scene.text[1])}</p>
        </div>
      </article>
    `).join('');
  }

  if(discardedScenes.length === 0){
    discardedList.innerHTML = '<div class="discarded-empty">まだありません。</div>';
  } else {
    discardedList.innerHTML = discardedScenes.map(scene => `
      <article class="card discarded-card" data-discarded-number="${scene.number}">
        <div class="card-top">
          <div class="card-number">場面${scene.number}</div>
          <button class="restore" data-restore-number="${scene.number}">戻す</button>
        </div>
        <div class="card-body">
          <p>${escapeHtml(scene.text[0])}${escapeHtml(scene.text[1])}</p>
        </div>
      </article>
    `).join('');
  }
}

function removeSceneWithAnimation(number){
  const card = sceneList.querySelector(`.card[data-number="${number}"]`);
  if(!card || currentDiscarded().has(number)) return;

  card.classList.add('removing');

  setTimeout(() => {
    currentDiscarded().add(number);
    pulseHud();
    render();
  }, 320);
}

function restoreScene(number){
  if(!currentDiscarded().has(number)) return;
  currentDiscarded().delete(number);
  pulseHud();
  render();
}

sceneList.addEventListener('click', (event) => {
  const btn = event.target.closest('button.discard');
  if(!btn) return;
  const number = Number(btn.dataset.number);
  removeSceneWithAnimation(number);
});

discardedList.addEventListener('click', (event) => {
  const btn = event.target.closest('button.restore');
  if(!btn) return;
  const number = Number(btn.dataset.restoreNumber);
  restoreScene(number);
});

resetBtn.addEventListener('click', () => {
  if(currentDiscarded().size === 0) return;
  currentDiscarded().clear();
  pulseHud();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
});

storySelect.addEventListener('change', (event) => {
  currentStoryKey = event.target.value;
  pulseHud();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
});

storySelect.value = currentStoryKey;
render();
</script>
</body>
</html>
