<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>物語 20場面 圧縮アプリ</title>
<style>
:root{
  --bg:#f7f4ee;
  --bg2:#f2ece2;
  --paper:#fffdfa;
  --paper-2:rgba(255,253,250,.9);
  --ink:#2c2925;
  --muted:#766e65;
  --line:#ddd4c8;
  --line-strong:#cfc4b5;
  --danger:#8d5f5c;
  --danger-bg:#fbf6f5;
  --shadow:0 10px 28px rgba(48,36,24,.06);
  --shadow-soft:0 4px 14px rgba(48,36,24,.05);
  --radius:18px;
  --hud-radius:999px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(circle at top left, rgba(201,214,212,.2), transparent 24%),
    radial-gradient(circle at top right, rgba(234,223,205,.34), transparent 28%),
    linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
  color:var(--ink);
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
}
.wrapper{
  max-width:900px;
  margin:0 auto;
  padding:22px 16px 96px;
}
.topline{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:18px;
}
.topline-left{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.title{
  font-size:1.06rem;
  font-weight:700;
  letter-spacing:.04em;
}
.story-select{
  appearance:none;
  border:1px solid var(--line);
  background:rgba(255,253,250,.82);
  color:var(--ink);
  font:inherit;
  padding:10px 40px 10px 14px;
  border-radius:999px;
  box-shadow:var(--shadow-soft);
  cursor:pointer;
  background-image:
    linear-gradient(45deg, transparent 50%, #7b7268 50%),
    linear-gradient(135deg, #7b7268 50%, transparent 50%);
  background-position:
    calc(100% - 18px) calc(50% - 2px),
    calc(100% - 12px) calc(50% - 2px);
  background-size:6px 6px, 6px 6px;
  background-repeat:no-repeat;
}
.reset-btn{
  appearance:none;
  border:1px solid var(--line);
  background:rgba(255,253,250,.82);
  color:var(--ink);
  font:inherit;
  padding:10px 16px;
  border-radius:999px;
  cursor:pointer;
  box-shadow:var(--shadow-soft);
  transition:transform .16s ease, box-shadow .16s ease, background .16s ease;
}
.reset-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(48,36,24,.08);
}
.reset-btn:active{
  transform:translateY(1px) scale(.99);
}
.section-title{
  margin:22px 2px 10px;
  color:var(--muted);
  font-size:.95rem;
  font-weight:700;
  letter-spacing:.04em;
}
.list{
  display:flex;
  flex-direction:column;
  gap:14px;
}
.discarded-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:8px;
}
.card{
  background:var(--paper-2);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px 18px 16px;
  transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease, opacity .22s ease;
  transform-origin:center center;
  will-change:transform, opacity;
}
.card:hover{
  transform:translateY(-1px);
  box-shadow:0 14px 32px rgba(48,36,24,.08);
  border-color:var(--line-strong);
}
.card.removing{
  pointer-events:none;
  animation:discardCard .42s cubic-bezier(.2,.8,.2,1) forwards;
}
.card.discarded-card{
  opacity:.72;
  transform:scale(.965);
  transform-origin:top center;
  background:rgba(241,238,233,.95);
  border-color:#d8d1c8;
  box-shadow:0 6px 16px rgba(48,36,24,.04);
}
.card.discarded-card:hover{
  transform:scale(.965);
  box-shadow:0 6px 16px rgba(48,36,24,.04);
  border-color:#d8d1c8;
}
@keyframes discardCard{
  0%{opacity:1;transform:scale(1) translateX(0);box-shadow:var(--shadow);}
  18%{opacity:1;transform:scale(.985) translateX(0);box-shadow:0 6px 12px rgba(48,36,24,.04);}
  100%{opacity:0;transform:scale(.96) translateX(54px);box-shadow:none;}
}
.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:12px;
}
.card-number{
  display:inline-flex;
  align-items:center;
  min-height:32px;
  padding:0 12px;
  border-radius:999px;
  background:#f3eee6;
  color:#6f675d;
  font-size:.93rem;
  font-weight:700;
  letter-spacing:.02em;
}
.discard{
  appearance:none;
  border:1px solid rgba(141,95,92,.26);
  background:var(--danger-bg);
  color:var(--danger);
  font:inherit;
  padding:8px 13px;
  border-radius:999px;
  cursor:pointer;
  transition:transform .12s ease, background .16s ease, box-shadow .16s ease;
}
.discard:hover{box-shadow:0 6px 16px rgba(141,95,92,.08);}
.discard:active{transform:scale(.96);}
.restore{
  appearance:none;
  border:1px solid rgba(118,109,101,.22);
  background:rgba(255,253,250,.82);
  color:var(--ink);
  font:inherit;
  padding:8px 13px;
  border-radius:999px;
  cursor:pointer;
  transition:transform .12s ease, box-shadow .16s ease;
}
.restore:hover{box-shadow:0 6px 16px rgba(48,36,24,.06);}
.restore:active{transform:scale(.96);}
.card-body p{
  margin:0;
  line-height:1.98;
  font-size:1.28rem;
  letter-spacing:.01em;
}
.remaining-chips{
  margin-top:18px;
  padding:15px 16px;
  border:1px solid var(--line);
  border-radius:16px;
  background:rgba(255,253,250,.68);
  color:var(--muted);
  font-size:1.08rem;
  line-height:2;
  letter-spacing:.02em;
}
.empty{
  text-align:center;
  color:var(--muted);
  border:1px dashed var(--line);
  border-radius:var(--radius);
  padding:38px 18px;
  background:rgba(255,255,255,.5);
}
.discarded-empty{
  color:var(--muted);
  font-size:.96rem;
  padding:8px 2px 2px;
}
.hud{
  position:fixed;
  top:calc(env(safe-area-inset-top, 0px) + 14px);
  right:14px;
  z-index:1000;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 14px;
  border:1px solid rgba(208,198,184,.78);
  border-radius:var(--hud-radius);
  background:rgba(255,253,249,.82);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  box-shadow:0 10px 26px rgba(48,36,24,.1);
}
.hud-label{color:var(--muted);font-size:.9rem;}
.hud-count{
  font-size:1.05rem;
  font-weight:800;
  letter-spacing:.03em;
  min-width:72px;
  text-align:right;
  display:inline-block;
  transform-origin:center center;
}
.hud.pulse .hud-count{animation:hudPulse .34s ease;}
@keyframes hudPulse{
  0%{transform:scale(1)}
  35%{transform:scale(1.12)}
  100%{transform:scale(1)}
}
.hud-mini{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#b7aba0;
  opacity:.9;
}
@media (max-width:700px){
  .wrapper{padding:16px 12px 88px}
  .topline{align-items:flex-start;flex-direction:column;gap:10px;}
  .topline-left{width:100%;}
  .story-select{max-width:100%;}
  .card{padding:16px 16px 14px}
  .card-top{flex-direction:column;align-items:flex-start}
  .card-body p{font-size:1.18rem;line-height:1.92}
  .remaining-chips{font-size:1rem}
  .hud{top:calc(env(safe-area-inset-top, 0px) + 10px);right:10px;padding:9px 12px;}
}
</style>
</head>
<body>
<div class="hud" id="hud">
  <div class="hud-mini"></div>
  <div class="hud-label">残り</div>
  <div class="hud-count" id="hudCount">20 / 20</div>
</div>

<div class="wrapper">
  <div class="topline">
    <div class="topline-left">
      <div class="title" id="pageTitle">浦島太郎 20場面</div>
      <select id="storySelect" class="story-select" aria-label="物語を選ぶ">
        <option value="urashimataro">浦島太郎</option>
        <option value="momotaro">桃太郎</option>
        <option value="kaguyahime">かぐや姫</option>
        <option value="cinderella">シンデレラ</option>
      </select>
    </div>
    <button class="reset-btn" id="resetBtn">全て戻す</button>
  </div>

  <div class="section-title">残っている場面</div>
  <div id="sceneList" class="list"></div>
  <div id="remainingChips" class="remaining-chips"></div>

  <div class="section-title">捨てた場面</div>
  <div id="discardedList" class="discarded-list"></div>
</div>

<script>

      ["それから数日たったころ、海へ出た浦島太郎の前に、あの亀がまた姿を現しました。","亀はお礼がしたいと言って、浦島太郎を竜宮城へ案内しようとしました。"],
      ["浦島太郎は亀の背に乗り、海の中へと入っていきました。","きらきら光る海の中には、魚や海藻や珊瑚が美しく広がっていました。"],
      ["やがて海の底近くに、光に包まれた美しい竜宮城が見えてきました。","浦島太郎は、その夢のようなけしきに思わず息をのみました。"],
      ["竜宮城へ着くと、乙姫がやさしい笑顔で浦島太郎を迎えてくれました。","乙姫は、亀を助けてくれたお礼を心をこめて伝えました。"],
      ["竜宮城では、美しい部屋に通され、めずらしいごちそうが次々に運ばれてきました。","浦島太郎は見たこともない海の幸や美しい器に、目をみはりました。"],
      ["ごちそうのあとは楽しい舞も始まり、竜宮城は華やかなよろこびに包まれました。","浦島太郎は手厚いもてなしを受けて、すっかり夢の中にいるような気持ちになりました。"],

  },
  cinderella: {
    title: "シンデレラ",
    scenes: [
      ["むかしむかし、ある町に、やさしい娘のシンデレラが暮らしていました。","けれども、実の母は早くになくなり、さびしい日々を送っていました。"],
      ["やがて父親は新しい妻を迎え、シンデレラには二人の姉ができました。","はじめのうちは、シンデレラも新しい家族とうまく暮らしたいと思っていました。"],
      ["けれども父親がなくなると、まま母と姉たちはすっかり冷たくなってしまいました。","シンデレラは家の仕事をすべて言いつけられ、召使いのように働かされるようになりました。"],
      ["朝早くから夜遅くまで、シンデレラはそうじや洗たくや料理に追われていました。","灰だらけの姿を見て、みんなはからかうようにシンデレラと呼びました。"],
      ["それでもシンデレラは、心の奥にやさしさと夢を失わずにいました。","小鳥やねずみたちだけが、そんなシンデレラのよい友だちでした。"],
      ["ある日、お城から国じゅうへ、舞踏会のおふれが届きました。","王子が花嫁をさがすため、若い娘たちを招くという知らせでした。"],
      ["姉たちはその話を聞くと、大さわぎで着る服や髪かざりを選び始めました。","シンデレラも舞踏会に行ってみたいと願いながら、姉たちのしたくを手伝いました。"],
      ["シンデレラが舞踏会に行きたいと言うと、まま母たちは笑って取り合いませんでした。","そんなみすぼらしい姿で行けるはずがないと、冷たく言い放ちました。"],
      ["それでもシンデレラは、仕事の合間に古いドレスを直してみました。","けれども姉たちはそれを見つけると、怒ってドレスを引き裂いてしまいました。"],
      ["やがて、まま母と姉たちは着飾って馬車に乗り、お城へ出かけていきました。","シンデレラがひとりで泣いていると、やさしい光に包まれて魔法使いが現れました。"],
      ["魔法使いは、かぼちゃを立派な馬車に変え、シンデレラを助けてくれました。","小さな生きものたちもりっぱなお供に変わり、したくはみるみる整っていきました。"],
      ["そしてシンデレラのみすぼらしい服は、きらきら光る美しいドレスに変わりました。","足もとには、透きとおるようなガラスのくつが用意されました。"],
      ["けれども魔法使いは、夜の十二時になったら魔法はとけると伝えました。","シンデレラはその約束を胸に、お城の舞踏会へ向かいました。"],
      ["広間に入ると、シンデレラはたちまち人々の目を引きました。","その美しさに、だれもが息をのみ、王子もまた見とれてしまいました。"],
      ["王子はシンデレラにやさしく手を差しのべ、二人は音楽に合わせて踊りました。","夢のようなひとときの中で、シンデレラの心はしあわせでいっぱいになりました。"],
      ["まわりの人たちは、その美しい娘がだれなのかとうわさし合いました。","けれども、着飾った姉たちでさえ、それがシンデレラだとは気づきませんでした。"],
      ["シンデレラも王子とすごす時間がうれしくて、時のたつのを忘れかけていました。","けれども、ふと時計を見て、十二時が近いことに気づきました。"],
      ["シンデレラはあわてて広間を飛び出し、階段をかけ下りていきました。","そのとき片方のガラスのくつがぬげましたが、拾うひまもなく走り去りました。"],
      ["王子はそのくつの持ち主をさがそうと決め、国じゅうの娘たちにくつをはかせました。","ついにシンデレラの家を訪れ、最後にシンデレラがはくと、くつはぴたりと合いました。"],
      ["王子はシンデレラこそ舞踏会で出会った娘だと知り、大きな喜びに包まれました。","こうしてシンデレラは王子と結ばれ、幸せに暮らしました。"]
    ]
  }
};

const stateByStory = {};
for (const key of Object.keys(STORY_DATA)) {
  stateByStory[key] = { discarded: new Set() };
}
let currentStoryKey = "urashimataro";

const storySelect = document.getElementById('storySelect');
const pageTitle = document.getElementById('pageTitle');
const sceneList = document.getElementById('sceneList');
const remainingCountHud = document.getElementById('hudCount');
const remainingChips = document.getElementById('remainingChips');
const discardedList = document.getElementById('discardedList');
const resetBtn = document.getElementById('resetBtn');
const hud = document.getElementById('hud');

function escapeHtml(text){
  return text
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}
function toCircledNumber(n){
  const map = {1:'①',2:'②',3:'③',4:'④',5:'⑤',6:'⑥',7:'⑦',8:'⑧',9:'⑨',10:'⑩',11:'⑪',12:'⑫',13:'⑬',14:'⑭',15:'⑮',16:'⑯',17:'⑰',18:'⑱',19:'⑲',20:'⑳'};
  return map[n] || String(n);
}
function currentStory(){ return STORY_DATA[currentStoryKey]; }
function currentDiscarded(){ return stateByStory[currentStoryKey].discarded; }
function keptScenes(){
  return currentStory().scenes.map((text, i) => ({ number: i + 1, text })).filter(scene => !currentDiscarded().has(scene.number));
}
function pulseHud(){
  hud.classList.remove('pulse');
  void hud.offsetWidth;
  hud.classList.add('pulse');
}
function updateHudAndFooter(){
  const kept = keptScenes();
  const total = currentStory().scenes.length;
  remainingCountHud.textContent = `${kept.length} / ${total}`;
  remainingChips.textContent = kept.length ? kept.map(scene => toCircledNumber(scene.number)).join(' ') : 'なし';
  pageTitle.textContent = `${currentStory().title} 20場面`;
}
function render(){
  const story = currentStory();
  const discardedSet = currentDiscarded();
  const allScenes = story.scenes.map((text, i) => ({ number: i + 1, text }));
  const kept = allScenes.filter(scene => !discardedSet.has(scene.number));
  const discardedScenes = allScenes.filter(scene => discardedSet.has(scene.number));

  updateHudAndFooter();

  if(kept.length === 0){
    sceneList.innerHTML = '<div class="empty">場面がありません。上の「全て戻す」で元に戻せます。</div>';
  } else {
    sceneList.innerHTML = kept.map(scene => `
      <article class="card" data-number="${scene.number}">
        <div class="card-top">
          <div class="card-number">場面${scene.number}</div>
          <button class="discard" data-number="${scene.number}">捨てる</button>
        </div>
        <div class="card-body">
          <p>${escapeHtml(scene.text[0])}${escapeHtml(scene.text[1])}</p>
        </div>
      </article>
    `).join('');
  }

  if(discardedScenes.length === 0){
    discardedList.innerHTML = '<div class="discarded-empty">まだありません。</div>';
  } else {
    discardedList.innerHTML = discardedScenes.map(scene => `
      <article class="card discarded-card" data-discarded-number="${scene.number}">
        <div class="card-top">
          <div class="card-number">場面${scene.number}</div>
          <button class="restore" data-restore-number="${scene.number}">戻す</button>
        </div>
        <div class="card-body">
          <p>${escapeHtml(scene.text[0])}${escapeHtml(scene.text[1])}</p>
        </div>
      </article>
    `).join('');
  }
}
function removeSceneWithAnimation(number){
  const card = sceneList.querySelector(`.card[data-number="${number}"]`);
  if(!card || currentDiscarded().has(number)) return;
  card.classList.add('removing');
  setTimeout(() => {
    currentDiscarded().add(number);
    pulseHud();
    render();
  }, 320);
}
function restoreScene(number){
  if(!currentDiscarded().has(number)) return;
  currentDiscarded().delete(number);
  pulseHud();
  render();
}

sceneList.addEventListener('click', (event) => {
  const btn = event.target.closest('button.discard');
  if(!btn) return;
  removeSceneWithAnimation(Number(btn.dataset.number));
});
discardedList.addEventListener('click', (event) => {
  const btn = event.target.closest('button.restore');
  if(!btn) return;
  restoreScene(Number(btn.dataset.restoreNumber));
});
resetBtn.addEventListener('click', () => {
  if(currentDiscarded().size === 0) return;
  currentDiscarded().clear();
  pulseHud();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
});
storySelect.addEventListener('change', (event) => {
  currentStoryKey = event.target.value;
  pulseHud();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
});

storySelect.value = currentStoryKey;
render();
</script>
</body>
</html>
